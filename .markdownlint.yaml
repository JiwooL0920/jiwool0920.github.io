# Markdownlint config for MkDocs Material blog
# Lenient rules appropriate for technical engineering posts with code blocks and tables.

default: true

# Allow longer lines — code blocks and table rows legitimately exceed 80 chars
MD013:
  line_length: 160
  code_blocks: false
  tables: false

# Allow inline HTML (MkDocs Material uses it for admonitions, badges)
MD033: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow bare URLs (links in further reading sections)
MD034: false

# Allow first heading to not be h1 (blog posts start with frontmatter, not h1)
MD041: false

# Allow emphasis as heading style for ADR status lines (**Status:** etc.)
MD036: false
